const DATA_KEY = "tracker-data-v4";
const OLD_V3_KEY = "tracker-data-v3";
const OLD_V2_KEY = "tracker-data-v2";
const OLD_V1_KEY = "tracker-data-v1";

const DEFAULT_DATA = {
  whatThisApp: "",
  globalNotes: "",
  expoGo: "",
  prompts: "",
  appleStore: "",
  workOnLater: "",
  marketingPlan: "",
};

// Strip the old divider scaffolding from migrated globalNotes so it's a clean plain note
function stripDividers(text) {
  if (!text) return "";
  // Remove the divider blocks: ━━━...━━━\nEMOJI  LABEL\n━━━...━━━
  return text.replace(/\n*━{4,}\n\S+?\s+[A-Z][A-Z0-9 \/]+?\n━{4,}\n*/g, "\n\n").trim();
}

function loadData() {
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { ...DEFAULT_DATA, ...parsed };
    }
    // Migrate from v3
    const v3Raw = localStorage.getItem(OLD_V3_KEY);
    if (v3Raw) {
      const v3 = JSON.parse(v3Raw);
      const migrated = {
        ...DEFAULT_DATA,
        globalNotes: stripDividers(v3.globalNotes || ""),
        prompts: v3.prompts || "",
      };
      localStorage.setItem(DATA_KEY, JSON.stringify(migrated));
      return migrated;
    }
    // Migrate from v2
    const v2Raw = localStorage.getItem(OLD_V2_KEY);
    if (v2Raw) {
      const v2 = JSON.parse(v2Raw);
      const migrated = {
        ...DEFAULT_DATA,
        globalNotes: v2.globalNotes || "",
        prompts: v2.prompts || "",
      };
      localStorage.setItem(DATA_KEY, JSON.stringify(migrated));
      return migrated;
    }
    // Migrate from v1
    const v1Raw = localStorage.getItem(OLD_V1_KEY);
    if (v1Raw) {
      const v1 = JSON.parse(v1Raw);
      const migrated = {
        ...DEFAULT_DATA,
        globalNotes: v1.globalNotes || "",
      };
      localStorage.setItem(DATA_KEY, JSON.stringify(migrated));
      return migrated;
    }
  } catch (e) {
    console.error("load failed", e);
  }
  return DEFAULT_DATA;
}

function saveData(data) {
  try {
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    console.error("save failed", e);
    return false;
  }
}

function getStorageSize() {
  try {
    const raw = localStorage.getItem(DATA_KEY) || "";
    return new Blob([raw]).size;
  } catch (e) {
    return 0;
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function App() {
  const [data, setData] = useState(DEFAULT_DATA);
  const [loading, setLoading] = useState(true);
  const [activeSection, setActiveSection] = useState(SECTIONS[0].id);
  const [storageSize, setStorageSize] = useState(0);

  useEffect(() => {
    setData(loadData());
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!loading) setStorageSize(getStorageSize());
  }, [data, loading]);

  useEffect(() => {
    if (loading) return;
    const observer = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter((e) => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        if (visible[0]) setActiveSection(visible[0].target.id);
      },
      { rootMargin: "-20% 0px -60% 0px", threshold: [0, 0.25, 0.5, 0.75, 1] }
    );
    SECTIONS.forEach((s) => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, [loading]);

  const persist = (next) => {
    setData(next);
    const ok = saveData(next);
    if (!ok) alert("Couldn't save — browser storage might be full.");
  };

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  if (loading) {
    return (
      <div style={styles.loadingWrap}>
        <div style={styles.loadingInner}>
          <SparklesIcon size={28} color="#E85D4E" />
          <span style={{ fontFamily: "Fraunces, serif", fontSize: 20 }}>waking up...</span>
        </div>
      </div>
    );
  }

  return (
    <div style={styles.app} className="app-container">
      <Sidebar
        activeSection={activeSection}
        onNavigate={scrollTo}
        storageSize={storageSize}
      />
      <main style={styles.main} className="main-content">
        {SECTIONS.map((s) => (
          <LockableTextSection
            key={s.id}
            id={s.id}
            eyebrow={s.eyebrow}
            title={s.title}
            subtitle={s.subtitle}
            icon={s.iconNode}
            stickerText={s.sticker}
            placeholder={s.placeholder}
            value={data[s.key]}
            onSave={(val) => persist({ ...data, [s.key]: val })}
            minHeight={s.minHeight}
            mono={s.mono}
          />
        ))}
        <div style={styles.footer}>
          <SparklesIcon size={14} color="#7A6E5A" />
          <span>end of the road · keep shipping</span>
        </div>
      </main>
    </div>
  );
}

function Sidebar({ activeSection, onNavigate, storageSize }) {

  return (

          <div style={styles.logoSub}>app progress tracker</div>
        </div>
      </div>

      <NavSection title="sections">
        {SECTIONS.map((s) => (
          <NavItem
            key={s.id}
            active={activeSection === s.id}
            onClick={() => onNavigate(s.id)}
            icon={s.navIconNode}
            label={s.navLabel}
          />
        ))}
      </NavSection>

      <div style={styles.sidebarFooter}>
        <div style={styles.storageLabel}>
          <span>browser storage</span>
          <span>{formatBytes(storageSize)}</span>
        </div>
        <div style={styles.storageBar}>
          <div style={{
            ...styles.storageFill,
            width: `${sizePercent}%`,
            background: sizePercent > 80 ? "#EF4444" : sizePercent > 60 ? "#F59E0B" : "#10B981",
          }} />

        <div style={styles.sidebarFooterText}>
          saved in this browser<br />
          <span style={{ opacity: 0.6 }}>per-device · local only</span>
        </div>
      </div>
    </aside>
  );
}

function NavItem({ active, onClick, icon, label }) {

function SectionHeader({ eyebrow, title, subtitle, sticker, stickerIcon }) {
  return (
    <div style={styles.sectionHeaderWrap}>
      <div>
        {eyebrow && <div style={styles.eyebrow}>{eyebrow}</div>}
        {title && <h2 style={styles.sectionTitle} className="page-title">{title}</h2>}
        {subtitle && <p style={styles.pageSub}>{subtitle}</p>}
      </div>
      {sticker && (
        <div style={styles.headerSticker}>
          {stickerIcon}<span>{sticker}</span>
        </div>
      )}
    </div>
  );
}

function LockableTextSection({ id, eyebrow, title, subtitle, icon, stickerText, placeholder, value, onSave, minHeight = 180, mono = false }) {
  const [editing, setEditing] = useState(!value);
  const [draft, setDraft] = useState(value);

  useEffect(() => {
    setDraft(value);
  }, [value]);

  const handleSave = () => {
    onSave(draft);
    setEditing(false);
  };

  const handleCancel = () => {
    setDraft(value);
    setEditing(false);
  };

  const dirty = draft !== value;

  return (
    <section id={id} style={styles.section}>
      <SectionHeader
        eyebrow={eyebrow}
        title={title}
        subtitle={subtitle}
        sticker={stickerText}
        stickerIcon={icon}
      />

      {editing ? (
        <>
          <textarea
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            placeholder={placeholder}
            style={{
              ...styles.textarea,
              minHeight,
              fontFamily: mono ? "'JetBrains Mono', monospace" : "'DM Sans', sans-serif",
              fontSize: mono ? 13 : 15,
            }}
          />
          <div style={styles.editActions}>
            <button style={styles.primaryBtn} onClick={handleSave}>
              <SaveIcon size={14} /> save
            </button>
            {value && (
              <button style={styles.ghostBtn} onClick={handleCancel}>cancel</button>
            )}
            {dirty && <span style={styles.dirtyHint}>unsaved changes</span>}
          </div>
        </>
      ) : (
        <div style={styles.lockedWrap}>
          <div style={styles.lockedBanner}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <LockIcon size={12} />
              <span>locked · click edit to change</span>
            </div>
            <button style={styles.editBtn} onClick={() => { setDraft(value); setEditing(true); }}>
              <Edit3Icon size={12} /> edit
            </button>
          </div>
          <div
            style={{
              ...styles.lockedContent,
              minHeight,
              fontFamily: mono ? "'JetBrains Mono', monospace" : "'DM Sans', sans-serif",
              fontSize: mono ? 13 : 15,
              whiteSpace: "pre-wrap",
            }}
          >
            {value || <span style={{ color: "#A99D85", fontStyle: "italic" }}>nothing written yet</span>}
          </div>
        </div>
      )}
    </section>
  );
}
