<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Control Room — App Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;0,9..144,900;1,9..144,600&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #FAF3E3;
    color: #2A2A2A;
  }
  input, textarea, button, select { font-family: 'DM Sans', system-ui, sans-serif; }
  input:focus, textarea:focus, select:focus { outline: 2px solid #E85D4E; outline-offset: 2px; }
  select { cursor: pointer; }
  textarea { resize: vertical; }
  .nav-item-hover:hover { background: #F5ECDE !important; }
  .paste-zone-focus { border-color: #E85D4E !important; background: #FFF8EF !important; }
  .img-card:hover .img-delete { opacity: 1 !important; }
  @media (max-width: 768px) {
    .app-container { flex-direction: column !important; }
    .sidebar { width: 100% !important; height: auto !important; position: relative !important; border-right: none !important; border-bottom: 2px solid #2A2A2A !important; }
    .main-content { padding: 24px 20px 60px 20px !important; }
    .page-title { font-size: 32px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const Icon = ({ children, size = 16, color = "currentColor", strokeWidth = 2 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
       fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    {children}
  </svg>
);
const ListChecksIcon = (p) => <Icon {...p}><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></Icon>;
const StickyNoteIcon = (p) => <Icon {...p}><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8Z"/><path d="M15 3v6h6"/></Icon>;
const PlusIcon = (p) => <Icon {...p}><path d="M12 5v14"/><path d="M5 12h14"/></Icon>;
const Trash2Icon = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>;
const CheckIcon = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
const RotateCcwIcon = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
const SparklesIcon = (p) => <Icon {...p}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></Icon>;
const XIcon = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
const Edit3Icon = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/></Icon>;
const LockIcon = (p) => <Icon {...p}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
const SaveIcon = (p) => <Icon {...p}><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></Icon>;
const ImageIcon = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;
const WandIcon = (p) => <Icon {...p}><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h.01"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/></Icon>;

const SCREENS = [
  { id: "home", label: "Home Page", emoji: "🏠" },
  { id: "settings", label: "Settings", emoji: "⚙️" },
  { id: "log", label: "Log Workout", emoji: "💪" },
  { id: "calendar", label: "Calendar", emoji: "📅" },
  { id: "history", label: "History / Data", emoji: "📊" },
];

const DATA_KEY = "tracker-data-v2";
const OLD_DATA_KEY = "tracker-data-v1";

const DEFAULT_DATA = {
  checklist: [],
  globalNotes: "",
  prompts: "",
  screens: Object.fromEntries(
    SCREENS.map((s) => [s.id, { brainstorm: "", images: [] }])
  ),
};

function loadData() {
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return {
        checklist: parsed.checklist || [],
        globalNotes: parsed.globalNotes || "",
        prompts: parsed.prompts || "",
        screens: Object.fromEntries(
          SCREENS.map((s) => [
            s.id,
            {
              brainstorm: parsed.screens?.[s.id]?.brainstorm || "",
              images: parsed.screens?.[s.id]?.images || [],
            },
          ])
        ),
      };
    }
    const oldRaw = localStorage.getItem(OLD_DATA_KEY);
    if (oldRaw) {
      const old = JSON.parse(oldRaw);
      const migrated = {
        checklist: old.checklist || [],
        globalNotes: old.globalNotes || "",
        prompts: "",
        screens: Object.fromEntries(
          SCREENS.map((s) => [
            s.id,
            {
              brainstorm: old.screens?.[s.id]?.notes || "",
              images: [],
            },
          ])
        ),
      };
      localStorage.setItem(DATA_KEY, JSON.stringify(migrated));
      return migrated;
    }
  } catch (e) {
    console.error("load failed", e);
  }
  return DEFAULT_DATA;
}

function saveData(data) {
  try {
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    console.error("save failed", e);
    return false;
  }
}

function getStorageSize() {
  try {
    const raw = localStorage.getItem(DATA_KEY) || "";
    return new Blob([raw]).size;
  } catch (e) {
    return 0;
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function App() {
  const [data, setData] = useState(DEFAULT_DATA);
  const [loading, setLoading] = useState(true);
  const [activeSection, setActiveSection] = useState("checklist");
  const [storageSize, setStorageSize] = useState(0);
  const [lightboxImage, setLightboxImage] = useState(null);

  useEffect(() => {
    if (!lightboxImage) return;
    const handler = (e) => {
      if (e.key === "Escape") setLightboxImage(null);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [lightboxImage]);

  useEffect(() => {
    setData(loadData());
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!loading) setStorageSize(getStorageSize());
  }, [data, loading]);

  useEffect(() => {
    if (loading) return;
    const sections = ["checklist", "notes", "prompts", ...SCREENS.map(s => s.id)];
    const observer = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter((e) => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        if (visible[0]) {
          setActiveSection(visible[0].target.id);
        }
      },
      { rootMargin: "-20% 0px -60% 0px", threshold: [0, 0.25, 0.5, 0.75, 1] }
    );
    sections.forEach((id) => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, [loading]);

  const persist = (next) => {
    setData(next);
    const ok = saveData(next);
    if (!ok) {
      alert("Couldn't save — you might be out of browser storage space. Try deleting some images.");
    }
  };

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  if (loading) {
    return (
      <div style={styles.loadingWrap}>
        <div style={styles.loadingInner}>
          <SparklesIcon size={28} color="#E85D4E" />
          <span style={{ fontFamily: "Fraunces, serif", fontSize: 20 }}>waking up...</span>
        </div>
      </div>
    );
  }

  return (
    <div style={styles.app} className="app-container">
      <Sidebar
        activeSection={activeSection}
        onNavigate={scrollTo}
        storageSize={storageSize}
      />
      <main style={styles.main} className="main-content">
        <ChecklistSection
          items={data.checklist}
          onChange={(checklist) => persist({ ...data, checklist })}
        />
        <LockableTextSection
          id="notes"
          eyebrow="scratch pad"
          title="Global Notes"
          subtitle="Big-picture stuff. Things that don't fit under a single screen."
          icon={<StickyNoteIcon size={14} color="#E85D4E" />}
          stickerText="notes"
          placeholder="architecture thoughts, naming decisions, feature ideas for later..."
          value={data.globalNotes}
          onSave={(globalNotes) => persist({ ...data, globalNotes })}
          minHeight={220}
        />
        <LockableTextSection
          id="prompts"
          eyebrow="library"
          title="Prompts Used"
          subtitle="Stash the prompts that worked so you can reuse them."
          icon={<WandIcon size={14} color="#E85D4E" />}
          stickerText="prompts"
          placeholder={"// midjourney — start button\na glowing rounded button, coral gradient...\n\n// claude — expo setup\nhelp me debug this error in..."}
          value={data.prompts}
          onSave={(prompts) => persist({ ...data, prompts })}
          minHeight={220}
          mono
        />
        <div style={styles.screensHeader}>
          <div style={styles.eyebrow}>the screens</div>
          <h2 style={styles.bigSectionTitle}>
            Brainstorm <span style={{ color: "#E85D4E" }}>each one</span>
          </h2>
          <p style={styles.pageSub}>
            A space per screen. Write what you're thinking, paste inspiration images.
          </p>
        </div>
        {SCREENS.map((screen) => (
          <ScreenSection
            key={screen.id}
            screen={screen}
            screenData={data.screens[screen.id]}
            onBrainstormSave={(brainstorm) =>
              persist({
                ...data,
                screens: {
                  ...data.screens,
                  [screen.id]: { ...data.screens[screen.id], brainstorm },
                },
              })
            }
            onAddImage={(image) =>
              persist({
                ...data,
                screens: {
                  ...data.screens,
                  [screen.id]: {
                    ...data.screens[screen.id],
                    images: [...(data.screens[screen.id].images || []), image],
                  },
                },
              })
            }
            onDeleteImage={(id) =>
              persist({
                ...data,
                screens: {
                  ...data.screens,
                  [screen.id]: {
                    ...data.screens[screen.id],
                    images: data.screens[screen.id].images.filter((i) => i.id !== id),
                  },
                },
              })
            }
            onImageClick={setLightboxImage}
          />
        ))}
        <div style={styles.footer}>
          <SparklesIcon size={14} color="#7A6E5A" />
          <span>end of the road · keep shipping</span>
        </div>
      </main>

      {lightboxImage && (
        <div
          onClick={() => setLightboxImage(null)}
          style={styles.lightboxOverlay}
        >
          <button
            onClick={(e) => { e.stopPropagation(); setLightboxImage(null); }}
            style={styles.lightboxClose}
            title="close (esc)"
          >
            <XIcon size={18} />
          </button>
          <img
            src={lightboxImage.data}
            alt=""
            onClick={(e) => e.stopPropagation()}
            style={styles.lightboxImg}
          />
        </div>
      )}
    </div>
  );
}

function Sidebar({ activeSection, onNavigate, storageSize }) {
  const sizePercent = Math.min(100, (storageSize / (5 * 1024 * 1024)) * 100);
  return (
    <aside style={styles.sidebar} className="sidebar">
      <div style={styles.logoWrap}>
        <div style={styles.logoBadge}>
          <SparklesIcon size={18} color="#FFF8EF" />
        </div>
        <div>
          <div style={styles.logoTitle}>control room</div>
          <div style={styles.logoSub}>app progress tracker</div>
        </div>
      </div>

      <NavSection title="top of page">
        <NavItem active={activeSection === "checklist"} onClick={() => onNavigate("checklist")}
          icon={<ListChecksIcon size={14} />} label="Expo Checklist" />
        <NavItem active={activeSection === "notes"} onClick={() => onNavigate("notes")}
          icon={<StickyNoteIcon size={14} />} label="Global Notes" />
        <NavItem active={activeSection === "prompts"} onClick={() => onNavigate("prompts")}
          icon={<WandIcon size={14} />} label="Prompts Used" />
      </NavSection>

      <NavSection title="screens">
        {SCREENS.map((s) => (
          <NavItem
            key={s.id}
            active={activeSection === s.id}
            onClick={() => onNavigate(s.id)}
            icon={<span style={{ fontSize: 13 }}>{s.emoji}</span>}
            label={s.label}
          />
        ))}
      </NavSection>

      <div style={styles.sidebarFooter}>
        <div style={styles.storageLabel}>
          <span>browser storage</span>
          <span>{formatBytes(storageSize)}</span>
        </div>
        <div style={styles.storageBar}>
          <div style={{
            ...styles.storageFill,
            width: `${sizePercent}%`,
            background: sizePercent > 80 ? "#EF4444" : sizePercent > 60 ? "#F59E0B" : "#10B981",
          }} />
        </div>
        <div style={styles.sidebarFooterText}>
          saved in this browser<br />
          <span style={{ opacity: 0.6 }}>per-device · local only</span>
        </div>
      </div>
    </aside>
  );
}

function NavSection({ title, children }) {
  return (
    <div style={styles.navSection}>
      <div style={styles.navSectionTitle}>{title}</div>
      {children}
    </div>
  );
}

function NavItem({ active, onClick, icon, label }) {
  return (
    <button
      onClick={onClick}
      className={active ? "" : "nav-item-hover"}
      style={{ ...styles.navItem, ...(active ? styles.navItemActive : {}) }}
    >
      <span style={styles.navItemIcon}>{icon}</span>
      <span style={styles.navItemLabel}>{label}</span>
    </button>
  );
}

function SectionHeader({ eyebrow, title, subtitle, sticker, stickerIcon }) {
  return (
    <div style={styles.sectionHeaderWrap}>
      <div>
        {eyebrow && <div style={styles.eyebrow}>{eyebrow}</div>}
        {title && <h2 style={styles.sectionTitle} className="page-title">{title}</h2>}
        {subtitle && <p style={styles.pageSub}>{subtitle}</p>}
      </div>
      {sticker && (
        <div style={styles.headerSticker}>
          {stickerIcon}<span>{sticker}</span>
        </div>
      )}
    </div>
  );
}

function ChecklistSection({ items, onChange }) {
  const [newItem, setNewItem] = useState("");

  const handleAdd = () => {
    if (!newItem.trim()) return;
    onChange([...items, { id: Date.now().toString(), text: newItem.trim(), done: false }]);
    setNewItem("");
  };

  return (
    <section id="checklist" style={styles.section}>
      <SectionHeader
        eyebrow="ritual"
        title="Expo Checklist"
        subtitle="Your steps for spinning things up each session. Add your own, check them off, reset when you're done."
        sticker="kickoff"
        stickerIcon={<ListChecksIcon size={14} color="#E85D4E" />}
      />

      <div style={styles.addRow}>
        <input
          value={newItem}
          onChange={(e) => setNewItem(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && handleAdd()}
          placeholder="add a step (e.g. cd into the project folder)"
          style={{ ...styles.textInput, flex: 1 }}
        />
        <button style={styles.primaryBtn} onClick={handleAdd}>
          <PlusIcon size={16} /> add step
        </button>
        {items.length > 0 && (
          <button
            style={styles.ghostBtn}
            onClick={() => onChange(items.map((i) => ({ ...i, done: false })))}
          >
            <RotateCcwIcon size={13} /> reset all
          </button>
        )}
      </div>

      <div style={styles.checklistList}>
        {items.length === 0 ? (
          <div style={styles.emptyState}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>📋</div>
            <div style={{ fontFamily: "Fraunces, serif", fontSize: 20 }}>empty checklist</div>
            <div style={{ color: "#7A6E5A", marginTop: 4 }}>add your first step above</div>
          </div>
        ) : (
          items.map((item, idx) => (
            <div key={item.id} style={styles.checklistItem}>
              <span style={styles.checklistNumber}>{idx + 1}</span>
              <button
                onClick={() =>
                  onChange(items.map((i) => i.id === item.id ? { ...i, done: !i.done } : i))
                }
                style={{ ...styles.checkbox, ...(item.done ? styles.checkboxDone : {}) }}
              >
                {item.done && <CheckIcon size={14} color="#FFF8EF" strokeWidth={3} />}
              </button>
              <span
                style={{
                  ...styles.checklistText,
                  textDecoration: item.done ? "line-through" : "none",
                  opacity: item.done ? 0.5 : 1,
                }}
              >
                {item.text}
              </span>
              <button
                onClick={() => onChange(items.filter((i) => i.id !== item.id))}
                style={styles.iconBtn}
                title="delete"
              >
                <XIcon size={14} />
              </button>
            </div>
          ))
        )}
      </div>
    </section>
  );
}

function LockableTextSection({ id, eyebrow, title, subtitle, icon, stickerText, placeholder, value, onSave, minHeight = 180, mono = false }) {
  const [editing, setEditing] = useState(!value);
  const [draft, setDraft] = useState(value);

  useEffect(() => {
    setDraft(value);
  }, [value]);

  const handleSave = () => {
    onSave(draft);
    setEditing(false);
  };

  const handleCancel = () => {
    setDraft(value);
    setEditing(false);
  };

  const dirty = draft !== value;
  const hasHeader = !!title || !!eyebrow;

  return (
    <section id={id} style={styles.section}>
      {hasHeader && (
        <SectionHeader
          eyebrow={eyebrow}
          title={title}
          subtitle={subtitle}
          sticker={stickerText}
          stickerIcon={icon}
        />
      )}

      {editing ? (
        <>
          <textarea
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            placeholder={placeholder}
            style={{
              ...styles.textarea,
              minHeight,
              fontFamily: mono ? "'JetBrains Mono', monospace" : "'DM Sans', sans-serif",
              fontSize: mono ? 13 : 15,
            }}
          />
          <div style={styles.editActions}>
            <button style={styles.primaryBtn} onClick={handleSave}>
              <SaveIcon size={14} /> save
            </button>
            {value && (
              <button style={styles.ghostBtn} onClick={handleCancel}>cancel</button>
            )}
            {dirty && <span style={styles.dirtyHint}>unsaved changes</span>}
          </div>
        </>
      ) : (
        <div style={styles.lockedWrap}>
          <div style={styles.lockedBanner}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <LockIcon size={12} />
              <span>locked · click edit to change</span>
            </div>
            <button style={styles.editBtn} onClick={() => { setDraft(value); setEditing(true); }}>
              <Edit3Icon size={12} /> edit
            </button>
          </div>
          <div
            style={{
              ...styles.lockedContent,
              minHeight,
              fontFamily: mono ? "'JetBrains Mono', monospace" : "'DM Sans', sans-serif",
              fontSize: mono ? 13 : 15,
              whiteSpace: "pre-wrap",
            }}
          >
            {value || <span style={{ color: "#A99D85", fontStyle: "italic" }}>nothing written yet</span>}
          </div>
        </div>
      )}
    </section>
  );
}

function ScreenSection({ screen, screenData, onBrainstormSave, onAddImage, onDeleteImage, onImageClick }) {
  return (
    <section id={screen.id} style={styles.screenSection}>
      <div style={styles.screenHeader}>
        <span style={{ fontSize: 36 }}>{screen.emoji}</span>
        <div>
          <div style={styles.eyebrow}>screen</div>
          <h2 style={styles.screenTitleText}>{screen.label}</h2>
        </div>
      </div>

      <ImageGallery
        images={screenData.images || []}
        onAdd={onAddImage}
        onDelete={onDeleteImage}
        onImageClick={onImageClick}
      />

      <LockableTextSection
        id={`${screen.id}-brainstorm`}
        placeholder={`what are you thinking about for the ${screen.label.toLowerCase()}?\nlayout ideas, features, problems, anything...`}
        value={screenData.brainstorm}
        onSave={onBrainstormSave}
        minHeight={160}
      />
    </section>
  );
}

function ImageGallery({ images, onAdd, onDelete, onImageClick }) {
  const [focused, setFocused] = useState(false);
  const [feedback, setFeedback] = useState(null);

  const handlePaste = (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    let found = false;
    for (const item of items) {
      if (item.type.startsWith("image/")) {
        found = true;
        const file = item.getAsFile();
        const reader = new FileReader();
        reader.onload = (ev) => {
          const image = {
            id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
            data: ev.target.result,
            type: file.type,
            addedAt: Date.now(),
          };
          try {
            onAdd(image);
            setFeedback({ type: "success", text: "image added" });
          } catch (err) {
            setFeedback({ type: "error", text: "couldn't save — storage full?" });
          }
          setTimeout(() => setFeedback(null), 2500);
        };
        reader.readAsDataURL(file);
      }
    }
    if (!found) {
      setFeedback({ type: "error", text: "no image in clipboard" });
      setTimeout(() => setFeedback(null), 2500);
    }
  };

  const handleUpload = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach((file) => {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const image = {
          id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
          data: ev.target.result,
          type: file.type,
          addedAt: Date.now(),
        };
        onAdd(image);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  return (
    <div style={styles.gallerySection}>
      <div style={styles.galleryHeader}>
        <div style={styles.galleryTitle}>
          <ImageIcon size={14} />
          <span>inspiration · iterations</span>
          {images.length > 0 && <span style={styles.galleryCount}>{images.length}</span>}
        </div>
        <label style={styles.uploadBtn}>
          <PlusIcon size={12} /> upload
          <input
            type="file"
            accept="image/*"
            multiple
            onChange={handleUpload}
            style={{ display: "none" }}
          />
        </label>
      </div>

      <div
        tabIndex={0}
        onPaste={handlePaste}
        onFocus={() => setFocused(true)}
        onBlur={() => setFocused(false)}
        className={focused ? "paste-zone-focus" : ""}
        style={styles.pasteZone}
      >
        <div style={styles.pasteZoneInner}>
          {focused ? (
            <>
              <div style={{ fontFamily: "Fraunces, serif", fontSize: 18, fontWeight: 600 }}>
                ready to paste ✨
              </div>
              <div style={styles.pasteHint}>Cmd/Ctrl + V to drop an image here</div>
            </>
          ) : (
            <>
              <div style={{ fontFamily: "Fraunces, serif", fontSize: 18, fontWeight: 600 }}>
                click here, then paste an image
              </div>
              <div style={styles.pasteHint}>or use the upload button above</div>
            </>
          )}
          {feedback && (
            <div style={{
              ...styles.feedback,
              background: feedback.type === "success" ? "#D1FAE5" : "#FEE2E2",
              color: feedback.type === "success" ? "#065F46" : "#991B1B",
            }}>
              {feedback.text}
            </div>
          )}
        </div>
      </div>

      {images.length > 0 && (
        <div style={styles.imageGrid}>
          {images.map((img) => (
            <div key={img.id} style={styles.imgCard} className="img-card">
              <img
                src={img.data}
                alt=""
                onClick={() => onImageClick && onImageClick(img)}
                style={{ ...styles.img, cursor: "zoom-in" }}
              />
              <button
                onClick={(e) => { e.stopPropagation(); onDelete(img.id); }}
                style={styles.imgDelete}
                className="img-delete"
                title="delete"
              >
                <Trash2Icon size={12} />
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
